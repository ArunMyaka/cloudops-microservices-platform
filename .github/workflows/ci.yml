name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python -m pytest

  docker:
    runs-on: ubuntu-latest
    needs: backend

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: app/backend
          push: true
          tags: ghcr.io/arunmyaka/cloudops-microservices-platform/backend:latest
      - uses: docker/build-push-action@v6
        with:
          context: app/frontend
          push: true
          tags: ghcr.io/arunmyaka/cloudops-microservices-platform/frontend:latest