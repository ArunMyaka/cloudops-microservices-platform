apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: cloudops
type: Opaque
stringData:
  database-url: postgresql://tasks:tasks_password@postgres:5432/tasks
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: cloudops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: tasks
            - name: POSTGRES_USER
              value: tasks
            - name: POSTGRES_PASSWORD
              value: tasks_password
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: cloudops
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

